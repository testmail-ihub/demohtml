<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Agents of Spokes</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --snc-green:     #62d84e;
      --snc-green-dim: #3a8f2d;
      --snc-navy:      #061525;
      --snc-navy2:     #0a1f33;
      --snc-navy3:     #0e2d47;
      --snc-blue:      #0b3d6b;
      --snc-teal:      #00c7b1;
      --snc-text:      #e8f4f8;
      --snc-muted:     #7a9bb5;
      --snc-border:    rgba(98,216,78,0.15);
      --snc-glow:      rgba(98,216,78,0.08);
      --mono:          'Space Mono', monospace;
      --sans:          'DM Sans', sans-serif;
    }
    /* ... existing styles ... */
  </style>
</head>
<body>

<!-- ═══════════════ HEADER ═══════════════ -->
<header>
  <!-- ... header content ... -->
</header>

<!-- ═══════════════ STAGE ═══════════════ -->
<main>
  <div id="stage-label"></div>

  <div id="empty">
    <section style="display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 18px;">
      <div style="width: 56px; height: 56px; border: 1px solid var(--snc-border); border-radius: 12px; display: flex; align-items: center; justify-content: center; background: var(--snc-navy2); margin-bottom: 4px;">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--snc-green)" stroke-width="1.5" stroke-linecap="round">
          <circle cx="12" cy="12" r="9"/>
          <path d="M8 12 C8 9.8 9.8 8 12 8 C14.2 8 16 9.8 16 12"/>
          <circle cx="12" cy="14.5" r="1.8" fill="var(--snc-green)"/>
        </svg>
      </div>
      <h3 style="font-size: 18px; color: var(--snc-green); font-weight: 600;">Hello World!</h3>
      <p style="font-size: 14px; color: var(--snc-muted); max-width: 380px;">Welcome to your GitHub-powered Hello World section, styled with ServiceNow CSS variables.</p>
    </section>
  </div>

  <div id="stage-label"></div>
  <iframe  id="frame"     sandbox="allow-scripts allow-same-origin"></iframe>
  <img     id="img-view"  alt="preview" />
  <pre     id="code-view"></pre>
  <div     id="anim-view"></div>
</main>

<!-- ═══════════════ FOOTER ═══════════════ -->
<footer>
  <!-- ... footer content ... -->
</footer>

<script>
  // ... existing script ...
</script>

</body>
</html>
